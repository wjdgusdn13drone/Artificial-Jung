<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#243574">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="정현우 명함">
  <meta name="mobile-web-app-capable" content="yes">
  <title>정현우 디지털 명함</title>
  <style>
    :root {
      --ink: #141821;
      --muted: #657083;
      --brand: #243574;
      --accent: #0b7f78;
      --line: #dde3ee;
      --paper: #ffffff;
      --soft: #eef2f7;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      letter-spacing: 0;
      background: radial-gradient(circle at top left, rgba(36, 53, 116, .10), transparent 32%), var(--soft);
    }
    body { display: grid; place-items: center; padding: 18px; }
    .card {
      width: min(100%, 980px);
      display: grid;
      grid-template-areas: "brand" "photo" "identity" "contacts" "qr" "buttons";
      grid-template-columns: 1fr;
      gap: 24px;
      padding: 22px;
      background: var(--paper);
      border: 1px solid rgba(36, 53, 116, .14);
      border-radius: 8px;
      box-shadow: 0 22px 56px rgba(20, 24, 33, .14);
      text-align: left;
    }
    .brand-row { grid-area: brand; display: flex; align-items: center; gap: 12px; }
    .logo { width: min(58vw, 250px); max-height: 68px; display: block; object-fit: contain; object-position: left center; }
    .photo-wrap {
      grid-area: photo;
      width: min(42vw, 138px);
      aspect-ratio: 4 / 5;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: 0 10px 24px rgba(20, 24, 33, .08);
      margin: 0;
    }
    .profile-photo { width: 100%; height: 100%; display: block; object-fit: cover; object-position: center top; }
    .identity { grid-area: identity; width: 100%; display: grid; gap: 9px; }
    .name { margin: 0; color: var(--brand); font-size: clamp(42px, 12vw, 68px); line-height: .98; font-weight: 900; }
    .role { margin: 0; font-size: clamp(22px, 6vw, 32px); line-height: 1.18; font-weight: 800; }
    .headline { margin: 8px 0 0; color: var(--accent); font-size: clamp(19px, 5.2vw, 26px); line-height: 1.25; font-weight: 850; }
    .sub { margin: 0; max-width: 44ch; color: var(--muted); font-size: clamp(14px, 3.7vw, 16px); line-height: 1.55; font-weight: 500; }
    .qr-wrap {
      grid-area: qr;
      width: min(76vw, 300px);
      aspect-ratio: 1;
      display: grid;
      place-items: center;
      padding: 14px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 10px 28px rgba(20, 24, 33, .08);
      justify-self: center;
    }
    .qr-image { width: 100%; height: 100%; display: block; object-fit: contain; image-rendering: pixelated; }
    .contacts { grid-area: contacts; width: 100%; display: grid; gap: 9px; color: var(--ink); font-size: clamp(15px, 4.2vw, 18px); line-height: 1.35; font-weight: 700; overflow-wrap: anywhere; }
    .contacts a { color: inherit; text-decoration: none; }
    .address { color: var(--muted); font-size: clamp(13px, 3.5vw, 15px); font-weight: 600; }
    .buttons { grid-area: buttons; width: 100%; display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .button {
      min-height: 52px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      border: 1px solid var(--brand);
      border-radius: 8px;
      background: var(--brand);
      color: #fff;
      font-family: inherit;
      font-size: 16px;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
    }
    .button.secondary { background: #fff; color: var(--brand); }
    .toast {
      position: fixed;
      left: 50%;
      bottom: 24px;
      z-index: 10;
      max-width: calc(100vw - 32px);
      padding: 13px 16px;
      border-radius: 8px;
      background: rgba(20, 24, 33, .94);
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      line-height: 1.35;
      opacity: 0;
      pointer-events: none;
      transform: translate(-50%, 14px);
      transition: opacity 180ms ease, transform 180ms ease;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    @media (min-width: 760px) {
      body { padding: 34px; }
      .card {
        grid-template-areas: "brand qr" "photo qr" "identity qr" "contacts qr" "buttons qr";
        grid-template-columns: minmax(0, 1.35fr) minmax(290px, .85fr);
        align-items: stretch;
        gap: 34px;
        padding: 38px;
      }
      .qr-wrap { width: min(30vw, 310px); align-self: center; }
      .photo-wrap { width: 132px; }
    }
    @media (max-width: 430px) { .buttons { grid-template-columns: 1fr; } }
  </style>
</head>

      address: "31538 충남 아산시 순천향로 22-12 앙뜨레프레너관 E407호"
    };

    const vcard = [
      "BEGIN:VCARD",
      "VERSION:3.0",
      "N:정;현우;;;",
      "FN:정현우",
      "ORG:(주)드로니아",
      "TITLE:과장",
      "TEL;TYPE=CELL:010-7531-6820",
      "TEL;TYPE=WORK,VOICE:041-531-0912",
      "TEL;TYPE=WORK,FAX:0504-337-0911",
      "EMAIL;TYPE=INTERNET,WORK:wjdgusdn13@naver.com",
      "URL:https://dronedu.kr",
      "ADR;TYPE=WORK:;;31538 충남 아산시 순천향로 22-12 앙뜨레프레너관 E407호;;;;",
      "NOTE:드론·AI 전문 기업",
      "END:VCARD"
    ].join("\n");

    const qrImage = document.getElementById("qrImage");

    const contactBlob = new Blob([vcard], { type: "text/vcard;charset=utf-8" });
    const saveLink = document.getElementById("saveContact");
    saveLink.href = URL.createObjectURL(contactBlob);
    saveLink.download = "정현우_드로니아.vcf";

    const saveCardButton = document.getElementById("saveCardImage");
    const toast = document.getElementById("toast");

    function showToast(message = "저장했어요 — 다운로드 폴더 확인") {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2300);
    }

    function roundRect(ctx, x, y, width, height, radius) {
      const r = Math.min(radius, width / 2, height / 2);
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.arcTo(x + width, y, x + width, y + height, r);
      ctx.arcTo(x + width, y + height, x, y + height, r);
      ctx.arcTo(x, y + height, x, y, r);
      ctx.arcTo(x, y, x + width, y, r);
      ctx.closePath();
    }

    function drawContain(ctx, image, x, y, width, height) {
      const scale = Math.min(width / image.naturalWidth, height / image.naturalHeight);
      const drawWidth = image.naturalWidth * scale;
      const drawHeight = image.naturalHeight * scale;
      ctx.drawImage(image, x, y + (height - drawHeight) / 2, drawWidth, drawHeight);
    }

    function drawCover(ctx, image, x, y, width, height) {
      const scale = Math.max(width / image.naturalWidth, height / image.naturalHeight);
      const sourceWidth = width / scale;
      const sourceHeight = height / scale;
      const sourceX = (image.naturalWidth - sourceWidth) / 2;
      const sourceY = Math.max(0, (image.naturalHeight - sourceHeight) * 0.12);
      ctx.drawImage(image, sourceX, sourceY, sourceWidth, sourceHeight, x, y, width, height);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines = Infinity) {
      const words = text.split(" ");
      let line = "";
      let count = 0;
      for (const word of words) {
        const test = line ? line + " " + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          ctx.fillText(line, x, y);
          y += lineHeight;
          count += 1;
          line = word;
          if (count >= maxLines - 1) break;
        } else {
          line = test;
        }
      }
      if (line && count < maxLines) ctx.fillText(line, x, y);
      return y + lineHeight;
    }

    async function ensureImageReady(image) {
      if (image.complete && image.naturalWidth) return;
      if (image.decode) return image.decode();
      await new Promise((resolve, reject) => {
        image.onload = resolve;
        image.onerror = reject;
      });
    }

    function getQrDrawable() {
      return qrImage;
    }

    async function createCardPngBlob() {
      const logo = document.querySelector(".logo");
      const profile = document.querySelector(".profile-photo");
      await Promise.all([ensureImageReady(logo), ensureImageReady(profile), ensureImageReady(qrImage)]);
      await new Promise((resolve) => requestAnimationFrame(resolve));
      const qr = getQrDrawable();
      if (!qr) throw new Error("QR code is not ready");

      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");
      const scale = 2;
      const width = 1200;
      const height = 720;
      canvas.width = width * scale;
      canvas.height = height * scale;
      ctx.scale(scale, scale);

      ctx.fillStyle = "#eef2f7";
      ctx.fillRect(0, 0, width, height);
      ctx.shadowColor = "rgba(20, 24, 33, .16)";
      ctx.shadowBlur = 32;
      ctx.shadowOffsetY = 18;
      roundRect(ctx, 46, 46, width - 92, height - 92, 20);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.shadowColor = "transparent";
      ctx.strokeStyle = "rgba(36, 53, 116, .14)";
      ctx.lineWidth = 1;
      roundRect(ctx, 46, 46, width - 92, height - 92, 20);
      ctx.stroke();

      drawContain(ctx, logo, 92, 82, 310, 76);
      ctx.save();
      roundRect(ctx, 92, 190, 132, 166, 14);
      ctx.clip();
      drawCover(ctx, profile, 92, 190, 132, 166);
      ctx.restore();
      ctx.strokeStyle = "#dde3ee";
      roundRect(ctx, 92, 190, 132, 166, 14);
      ctx.stroke();

      ctx.fillStyle = "#243574";
      ctx.font = "900 62px 'Noto Sans KR', 'Segoe UI', sans-serif";
      ctx.fillText(cardData.name, 254, 238);
      ctx.fillStyle = "#141821";
      ctx.font = "800 30px 'Noto Sans KR', 'Segoe UI', sans-serif";
      ctx.fillText(cardData.role, 254, 286);
      ctx.fillStyle = "#0b7f78";
      ctx.font = "850 27px 'Noto Sans KR', 'Segoe UI', sans-serif";
      ctx.fillText(cardData.headline, 254, 338);
      ctx.fillStyle = "#657083";
      ctx.font = "500 19px 'Noto Sans KR', 'Segoe UI', sans-serif";
      wrapText(ctx, cardData.sub, 92, 414, 610, 30, 3);
      ctx.fillStyle = "#141821";
      ctx.font = "800 22px 'Noto Sans KR', 'Segoe UI', sans-serif";
      ctx.fillText(cardData.mobile, 92, 532);
      ctx.fillText(cardData.email, 92, 568);
      ctx.fillText(cardData.web, 92, 604);
      ctx.fillStyle = "#657083";
      ctx.font = "650 17px 'Noto Sans KR', 'Segoe UI', sans-serif";
      wrapText(ctx, cardData.address, 92, 642, 610, 24, 2);

      roundRect(ctx, 780, 116, 310, 382, 18);
      ctx.fillStyle = "#f9fbfe";
      ctx.fill();
      ctx.strokeStyle = "#dde3ee";
      ctx.stroke();
      roundRect(ctx, 820, 156, 230, 230, 12);
      ctx.fillStyle = "#fff";
      ctx.fill();
      ctx.strokeStyle = "#dde3ee";
      ctx.stroke();
      ctx.drawImage(qr, 836, 172, 198, 198);
      ctx.fillStyle = "#657083";
      ctx.font = "800 18px 'Noto Sans KR', 'Segoe UI', sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("QR로 연락처 저장", 935, 432);
      ctx.font = "600 14px 'Noto Sans KR', 'Segoe UI', sans-serif";
      ctx.fillText("Scan to save contact", 935, 460);
      ctx.textAlign = "left";
      return await new Promise((resolve) => canvas.toBlob(resolve, "image/png", 1));
    }

    function downloadBlob(blob, filename) {
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function isMobileDevice() {
      return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent) || (window.innerWidth <= 760 && navigator.maxTouchPoints > 1);
    }

    saveCardButton.addEventListener("click", async () => {
      const original = saveCardButton.textContent;
      saveCardButton.disabled = true;
      saveCardButton.textContent = "저장 중";
      try {
        const blob = await createCardPngBlob();
        const filename = "정현우_드로니아_명함.png";
        const file = new File([blob], filename, { type: "image/png" });
        if (isMobileDevice() && navigator.canShare && navigator.canShare({ files: [file] }) && navigator.share) {
          await navigator.share({ files: [file], title: "정현우 디지털 명함", text: "정현우 드로니아 명함" });
          showToast("저장했어요 — 공유 시트 확인");
        } else {
          downloadBlob(blob, filename);
          showToast("저장했어요 — 다운로드 폴더 확인");
        }
      } catch (error) {
        console.error(error);
        showToast("저장에 실패했어요 — 다시 눌러주세요");
      } finally {
        saveCardButton.disabled = false;
        saveCardButton.textContent = original;
      }
    });
  </script>
