<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#27336f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="내 명함">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>명함_정현우</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <style>
    :root {
      --ink: #111827;
      --muted: #6B7280;
      --line: rgba(46, 52, 125, 0.12);
      --brand: #2E347D;
      --deep-brand: #1F245F;
      --accent: #FF5A5F;
      --paper: #F3F4F7;
      --glass: rgba(255, 255, 255, 0.78);
      --card: #ffffff;
      --shadow: 0 28px 80px rgba(31, 36, 95, 0.13);
    }

    * { box-sizing: border-box; }

    html, body { min-height: 100%; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", "Apple SD Gothic Neo", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(46, 52, 125, 0.10) 0%, rgba(255, 255, 255, 0) 42%),
        linear-gradient(180deg, #fbfbfd 0%, var(--paper) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(18px, env(safe-area-inset-top)) 16px max(18px, env(safe-area-inset-bottom));
    }

    main {
      width: min(1040px, 100%);
    }

    .business-card {
      width: 100%;
      background: var(--glass);
      border: 1px solid rgba(255, 255, 255, 0.72);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: clamp(24px, 4vw, 48px);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(240px, 0.62fr);
      grid-template-areas:
        "brand photo"
        "identity qr"
        "contacts qr"
        "buttons buttons";
      gap: clamp(20px, 3vw, 36px);
      position: relative;
      overflow: hidden;
    }

    .business-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto 0;
      height: 8px;
      background: linear-gradient(90deg, var(--deep-brand), var(--brand));
    }

    .brand { grid-area: brand; align-self: start; }

    .brand-logo {
      display: block;
      width: min(275px, 72vw);
      height: auto;
    }

    .photo-box {
      grid-area: photo;
      justify-self: end;
      width: clamp(108px, 16vw, 148px);
      aspect-ratio: 1 / 1;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 16px 36px rgba(31, 36, 95, 0.13);
      background: #fff;
    }

    .profile-photo {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 18%;
      display: block;
    }

    .identity { grid-area: identity; align-self: end; }

    .name {
      margin: 0;
      font-size: clamp(48px, 8vw, 78px);
      line-height: 0.98;
      font-weight: 900;
      letter-spacing: 0;
      color: var(--deep-brand);
    }

    .role {
      margin: 16px 0 0;
      font-size: clamp(21px, 3vw, 32px);
      line-height: 1.16;
      font-weight: 800;
    }

    .headline {
      margin: 14px 0 0;
      font-size: clamp(18px, 2.4vw, 25px);
      line-height: 1.3;
      color: var(--brand);
      font-weight: 850;
    }

    .sub {
      margin: 10px 0 0;
      max-width: 650px;
      color: var(--muted);
      font-size: clamp(14px, 1.8vw, 18px);
      line-height: 1.55;
      word-break: keep-all;
    }

    .qr-panel {
      grid-area: qr;
      align-self: center;
      justify-self: stretch;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: clamp(18px, 2.6vw, 26px);
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: 26px;
      background: rgba(255, 255, 255, 0.62);
      box-shadow: 0 18px 44px rgba(31, 36, 95, 0.12);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    .qr-title {
      margin: 0;
      font-size: 14px;
      font-weight: 800;
      color: var(--deep-brand);
    }

    .qr-box {
      width: min(100%, 286px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      padding: 12px;
      background: #fff;
      border: 1px solid rgba(46, 52, 125, 0.12);
      border-radius: 22px;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.65), 0 12px 30px rgba(31, 36, 95, 0.08);
    }

    #qrcode, #qrcode img {
      width: 100% !important;
      height: 100% !important;
      display: block;
      image-rendering: pixelated;
    }

    .qr-static {
      object-fit: contain;
    }

    .catalog-link {
      width: 100%;
      min-height: 46px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 14px;
      background: rgba(255, 255, 255, 0.78);
      color: var(--brand);
      border: 1px solid rgba(46, 52, 125, 0.14);
      font-size: 14px;
      font-weight: 850;
      text-decoration: none;
      text-align: center;
      box-shadow: 0 10px 26px rgba(31, 36, 95, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease;
    }

    .catalog-link::before {
      content: "";
      width: 28px;
      height: 28px;
      margin-right: 8px;
      flex: 0 0 auto;
      background: url("icon-ui-brochure.png") center / contain no-repeat;
      filter: drop-shadow(0 5px 10px rgba(31, 36, 95, 0.12));
    }

    .contacts {
      grid-area: contacts;
      display: grid;
      gap: 0;
      align-self: start;
      font-size: clamp(15px, 2vw, 17px);
      line-height: 1.35;
      border-top: 1px solid #edf0f6;
      border-bottom: 1px solid #edf0f6;
      padding: 14px 18px;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.76);
      background: rgba(255, 255, 255, 0.58);
      box-shadow: 0 16px 36px rgba(31, 36, 95, 0.08);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .contact-row {
      display: grid;
      grid-template-columns: 112px minmax(0, 1fr);
      gap: 14px;
      align-items: start;
      padding: 10px 0;
      border-bottom: 1px solid #edf0f6;
    }

    .contact-row:last-child {
      border-bottom: 0;
    }

    .contact-label {
      color: var(--muted);
      font-weight: 850;
      font-size: 0.88em;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      min-width: 0;
    }

    .contact-label::before {
      content: "";
      width: 22px;
      height: 22px;
      flex: 0 0 22px;
      border-radius: 7px;
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      filter: drop-shadow(0 5px 9px rgba(31, 36, 95, 0.13));
    }

    #mobileLabel::before { background-image: url("icon-ui-mobile.png"); }
    #emailLabel::before { background-image: url("icon-ui-email.png"); }
    #webLabel::before { background-image: url("icon-ui-website.png"); }
    #addressLabel::before { background-image: url("icon-ui-address.png"); }

    .contact-value {
      color: var(--ink);
      text-decoration: none;
      overflow-wrap: anywhere;
      font-weight: 680;
    }

    .buttons {
      grid-area: buttons;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-top: 0;
      padding: 13px;
      border: 1px solid rgba(255, 255, 255, 0.76);
      border-radius: 32px;
      background: rgba(255, 255, 255, 0.60);
      box-shadow: 0 22px 54px rgba(31, 36, 95, 0.16);
      backdrop-filter: blur(26px);
      -webkit-backdrop-filter: blur(26px);
    }

    .button {
      appearance: none;
      border: 1px solid rgba(46, 52, 125, 0.12);
      border-radius: 24px;
      min-height: 68px;
      padding: 10px 10px 11px;
      font-size: 12px;
      font-weight: 850;
      text-decoration: none;
      display: inline-flex;
      flex-direction: column;
      gap: 6px;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.86);
      color: var(--deep-brand);
      box-shadow: 0 10px 24px rgba(31, 36, 95, 0.08);
      transition: transform 160ms ease, box-shadow 160ms ease, background 160ms ease, border-color 160ms ease;
    }

    .button::before {
      content: "";
      width: 32px;
      height: 32px;
      border-radius: 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      box-shadow: 0 8px 18px rgba(31, 36, 95, 0.12);
    }

    #toggleLanguage::before {
      background-image: url("icon-ui-language.png");
    }

    #saveContact::before {
      background-image: url("icon-ui-contact-save.png");
    }

    #callButton::before {
      background-image: url("icon-ui-call.png");
    }

    #saveCardImage::before {
      background-image: url("icon-ui-card-save.png");
    }

    .button:hover,
    .catalog-link:hover,
    .lang-option:hover {
      transform: translateY(-1px);
      box-shadow: 0 14px 32px rgba(31, 36, 95, 0.13);
    }

    .button.secondary {
      color: var(--brand);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: none;
      border: 1px solid rgba(46, 52, 125, 0.12);
    }

    .button.ghost {
      color: var(--brand);
      background: rgba(255, 255, 255, 0.88);
      box-shadow: none;
      border: 1px solid rgba(46, 52, 125, 0.12);
    }

    .language-control {
      position: relative;
      min-width: 0;
    }

    .language-control .button {
      width: 100%;
      height: 100%;
    }

    .language-menu {
      position: absolute;
      left: 0;
      right: 0;
      bottom: calc(100% + 7px);
      display: none;
      gap: 6px;
      padding: 8px;
      border: 1px solid rgba(255, 255, 255, 0.78);
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.82);
      box-shadow: 0 18px 42px rgba(31, 36, 95, 0.15);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      z-index: 5;
    }

    .language-menu.open {
      display: grid;
    }

    .lang-option {
      appearance: none;
      border: 0;
      border-radius: 16px;
      min-height: 42px;
      padding: 10px 12px;
      background: rgba(255, 255, 255, 0.72);
      color: var(--brand);
      font-size: 14px;
      font-weight: 850;
      cursor: pointer;
    }

    .lang-option.active {
      background: var(--brand);
      color: #ffffff;
    }

    .button:active,
    .catalog-link:active,
    .lang-option:active {
      transform: translateY(1px);
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: max(18px, env(safe-area-inset-bottom));
      transform: translateX(-50%) translateY(20px);
      opacity: 0;
      pointer-events: none;
      background: rgba(17, 24, 39, 0.94);
      color: #fff;
      border-radius: 8px;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 750;
      transition: opacity 180ms ease, transform 180ms ease;
      z-index: 10;
      width: max-content;
      max-width: calc(100vw - 32px);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 720px) {
      body {
        align-items: stretch;
        padding: 10px 10px max(12px, env(safe-area-inset-bottom));
        background:
          linear-gradient(145deg, rgba(46, 52, 125, 0.11) 0%, rgba(255, 255, 255, 0) 46%),
          #f5f5f7;
      }

      main { min-height: 100%; display: flex; align-items: center; }

      .business-card {
        grid-template-columns: 1fr;
        grid-template-areas:
          "brand"
          "photo"
          "identity"
          "qr"
          "contacts"
          "buttons";
        gap: 16px;
        min-height: calc(100svh - 20px);
        padding: 22px 16px 16px;
        border-radius: 28px;
      }

      .brand-logo { width: min(232px, 78vw); }

      .photo-box { justify-self: start; width: clamp(96px, 28vw, 124px); border-radius: 22px; }

      .name { font-size: clamp(42px, 14vw, 62px); }

      .role { font-size: clamp(21px, 6.5vw, 28px); margin-top: 12px; }

      .headline { font-size: clamp(18px, 5vw, 23px); }

      .sub { font-size: 14px; line-height: 1.48; }

      .qr-panel { padding: 16px; gap: 13px; border-radius: 24px; }

      .qr-box { width: min(74vw, 286px); border-radius: 20px; }

      .contact-row { grid-template-columns: 104px minmax(0, 1fr); gap: 10px; padding: 9px 0; }

      .contacts { padding: 12px 14px; border-radius: 22px; }

      .buttons {
        position: sticky;
        bottom: max(10px, env(safe-area-inset-bottom));
        z-index: 8;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
        border-radius: 30px;
      }

      .button {
        min-height: 68px;
        padding: 9px 5px 10px;
        font-size: 10.5px;
        line-height: 1.15;
        word-break: keep-all;
      }

      .button::before {
        width: 31px;
        height: 31px;
        border-radius: 12px;
      }

      .language-menu {
        bottom: calc(100% + 8px);
        top: auto;
      }
    }
  </style>
</head>

    function vcardLine(label, value) {
      return value ? label + ":" + String(value).replace(/\n/g, "\\n") : "";
    }

    function buildVCard(data) {
      return [
        "BEGIN:VCARD",
        "VERSION:3.0",
        vcardLine("N", data.n),
        vcardLine("FN", data.name),
        vcardLine("ORG", data.org),
        vcardLine("TITLE", data.title),
        vcardLine("TEL;TYPE=CELL", data.mobile),
        vcardLine("TEL;TYPE=WORK", data.phone),
        vcardLine("TEL;TYPE=FAX", data.fax),
        vcardLine("EMAIL;TYPE=INTERNET", data.email),
        vcardLine("URL", data.url),
        vcardLine("ADR;TYPE=WORK", ";;" + data.address + ";;;;"),
        vcardLine("NOTE", data.headline),
        "END:VCARD"
      ].filter(Boolean).join("\n");
    }

    function updateContactFile(data) {
      if (contactUrl) URL.revokeObjectURL(contactUrl);
      const blob = new Blob([buildVCard(data)], { type: "text/vcard;charset=utf-8" });
      contactUrl = URL.createObjectURL(blob);
      els.saveContact.href = contactUrl;
      els.saveContact.download = data.vcfFilename;
    }

    function showToast(message) {

    function waitForQr() {
      return new Promise((resolve) => {
        const started = Date.now();
        const tick = () => {
          const drawable = els.qrcode.querySelector("img");
          if ((drawable && drawable.complete && drawable.naturalWidth > 0) || Date.now() - started > 1800) resolve(drawable);
          else requestAnimationFrame(tick);
        };
        tick();
      });
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    function drawRoundRect(ctx, x, y, w, h, r) {
      const radius = Math.min(r, w / 2, h / 2);
      ctx.beginPath();
      ctx.moveTo(x + radius, y);
      ctx.arcTo(x + w, y, x + w, y + h, radius);
      ctx.arcTo(x + w, y + h, x, y + h, radius);
      ctx.arcTo(x, y + h, x, y, radius);
      ctx.arcTo(x, y, x + w, y, radius);
      ctx.closePath();
    }

    function drawCover(ctx, img, x, y, w, h) {
      const scale = Math.max(w / img.width, h / img.height);
      const sw = w / scale;
      const sh = h / scale;
      const sx = (img.width - sw) / 2;
      const sy = Math.max(0, (img.height - sh) * 0.16);
      ctx.drawImage(img, sx, sy, sw, sh, x, y, w, h);
    }

    function drawContain(ctx, img, x, y, w, h) {
      const scale = Math.min(w / img.width, h / img.height);
      const dw = img.width * scale;
      const dh = img.height * scale;
      ctx.drawImage(img, x + (w - dw) / 2, y + (h - dh) / 2, dw, dh);
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
      const words = String(text).split(/\s+/);
      const lines = [];
      let line = "";
      for (const word of words) {
        const test = line ? line + " " + word : word;
        if (ctx.measureText(test).width > maxWidth && line) {
          lines.push(line);
          line = word;
          if (maxLines && lines.length >= maxLines - 1) break;
        } else {
          line = test;
        }
      }
      if (line) lines.push(line);
      lines.slice(0, maxLines || lines.length).forEach((entry, index) => {
        ctx.fillText(entry, x, y + index * lineHeight);
      });
      return y + Math.min(lines.length, maxLines || lines.length) * lineHeight;
    }

    async function createCardPngBlob() {
      const data = profiles[currentLang];
      const qrDrawable = await waitForQr();
      const logo = await loadImage(document.querySelector(".brand-logo").src);
      const profile = await loadImage(document.querySelector(".profile-photo").src);
      const canvas = document.createElement("canvas");
      canvas.width = 1600;
      canvas.height = 960;
      const ctx = canvas.getContext("2d");

      ctx.fillStyle = "#f5f5f7";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#ffffff";
      drawRoundRect(ctx, 86, 76, 1428, 808, 8);
      ctx.fill();
      ctx.strokeStyle = "#d9dfec";
      ctx.lineWidth = 2;
      drawRoundRect(ctx, 86, 76, 1428, 808, 8);
      ctx.stroke();
      ctx.fillStyle = "#293373";
      drawRoundRect(ctx, 86, 76, 1428, 14, 7);
      ctx.fill();

      drawContain(ctx, logo, 150, 132, 410, 104);
      ctx.save();
      drawRoundRect(ctx, 1262, 126, 148, 148, 8);
      ctx.clip();
      drawCover(ctx, profile, 1262, 126, 148, 148);
      ctx.restore();
      ctx.strokeStyle = "#d9dfec";
      ctx.lineWidth = 2;
      drawRoundRect(ctx, 1262, 126, 148, 148, 8);
      ctx.stroke();

      ctx.fillStyle = "#293373";
      ctx.font = "900 88px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
      ctx.fillText(data.name, 150, 364);
      ctx.fillStyle = "#111827";
      ctx.font = "800 42px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
      wrapText(ctx, data.role, 150, 430, 760, 52, 2);
      ctx.fillStyle = "#293373";
      ctx.font = "850 32px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
      wrapText(ctx, data.headline, 150, 522, 740, 42, 2);
      ctx.fillStyle = "#667085";
      ctx.font = "500 24px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
      const afterSub = wrapText(ctx, data.sub, 150, 584, 780, 34, 3);

      const contactY = Math.min(afterSub + 42, 690);
      ctx.strokeStyle = "#edf0f6";
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(150, contactY - 30);
      ctx.lineTo(910, contactY - 30);
      ctx.stroke();
      ctx.fillStyle = "#5f6680";
      ctx.font = "800 23px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
      ctx.fillText(data.labels.mobile, 150, contactY + 10);
      ctx.fillText(data.labels.email, 150, contactY + 50);
      ctx.fillText(data.labels.web, 150, contactY + 90);
      ctx.fillText(data.labels.address, 150, contactY + 130);
      ctx.fillStyle = "#111827";
      ctx.font = "680 25px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
      ctx.fillText(data.mobile, 274, contactY + 10);
      ctx.fillText(data.email, 274, contactY + 50);
      ctx.fillText(data.web, 274, contactY + 90);
      ctx.font = "680 22px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
      wrapText(ctx, data.address, 274, contactY + 130, 650, 30, 2);

      ctx.fillStyle = "#fafbff";
      drawRoundRect(ctx, 1028, 318, 366, 428, 8);
      ctx.fill();
      ctx.strokeStyle = "#d9dfec";
      ctx.lineWidth = 2;
      drawRoundRect(ctx, 1028, 318, 366, 428, 8);
      ctx.stroke();
      ctx.fillStyle = "#293373";
      ctx.font = "800 24px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText(data.qrTitle, 1211, 374);
      ctx.textAlign = "left";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(1085, 406, 252, 252);
      ctx.strokeStyle = "#e5e7ef";
      ctx.lineWidth = 2;
      ctx.strokeRect(1085, 406, 252, 252);
      if (qrDrawable) ctx.drawImage(qrDrawable, 1085, 406, 252, 252);
      ctx.fillStyle = "#ffffff";
      drawRoundRect(ctx, 1085, 680, 252, 44, 8);
      ctx.fill();
      ctx.strokeStyle = "rgba(41, 51, 115, 0.22)";
      ctx.lineWidth = 2;
      drawRoundRect(ctx, 1085, 680, 252, 44, 8);
      ctx.stroke();
      ctx.fillStyle = "#293373";
      let catalogFontSize = 20;
      do {
        ctx.font = "800 " + catalogFontSize + "px 'Noto Sans KR', 'Segoe UI', Arial, sans-serif";
        catalogFontSize -= 1;
      } while (ctx.measureText(data.catalogLabel).width > 220 && catalogFontSize > 12);
      ctx.textAlign = "center";
      ctx.fillText(data.catalogLabel, 1210, 718);
      ctx.textAlign = "left";

      return new Promise((resolve) => canvas.toBlob(resolve, "image/png", 0.95));
    }

    async function saveCardImage() {
      const data = profiles[currentLang];
      showToast(data.toast.saving);
      try {
        const blob = await createCardPngBlob();
        const file = new File([blob], data.imageFilename, { type: "image/png" });
        const isMobileShare = navigator.canShare && navigator.canShare({ files: [file] }) && /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
        if (isMobileShare) {
          await navigator.share({ files: [file], title: data.name, text: data.role });
          showToast(data.toast.shared);
          return;
        }
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = data.imageFilename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        window.setTimeout(() => URL.revokeObjectURL(url), 1000);
        showToast(data.toast.saved);
      } catch (error) {
        showToast(data.toast.failed);
      }
    }

    function closeLanguageMenu() {
      els.languageMenu.classList.remove("open");

    els.toggleLanguage.addEventListener("click", () => {
      const willOpen = !els.languageMenu.classList.contains("open");
      els.languageMenu.classList.toggle("open", willOpen);
      els.toggleLanguage.setAttribute("aria-expanded", String(willOpen));
    });

    els.languageMenu.addEventListener("click", (event) => {
      const option = event.target.closest(".lang-option");
      if (!option) return;
      renderLanguage(option.dataset.lang);
      closeLanguageMenu();
    });

    document.addEventListener("click", (event) => {
      if (!event.target.closest(".language-control")) closeLanguageMenu();
    });

        navigator.serviceWorker.register("sw.js").catch(() => {});
